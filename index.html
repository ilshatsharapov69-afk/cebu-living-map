<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philippines Living Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="sidebar">
    <h1>Philippines Living Map</h1>
    <p style="font-size:10px;color:#666;text-align:center;">Топ-200 мест для жизни на Филиппинах</p>

    <h2>POI слои (реальные данные OSM)</h2>
    <div id="poi-toggles" class="poi-toggles"></div>
    <div id="poi-status" class="poi-status"></div>

    <h2>Безопасность (слои)</h2>
    <div id="hazard-toggles" class="hazard-toggles"></div>
    <div id="hazard-legend" class="hazard-legend">
        <span style="font-size:9px;color:#888;">Точки = реальные инциденты | Heatmap = плотность</span>
    </div>
    <div id="hazard-status" class="poi-status"></div>

    <div class="hazard-toggle locations-toggle">
        <input type="checkbox" id="show-locations" checked>
        <span>📍 Показать локации</span>
    </div>

    <div id="location-ui">
    <h2>Факторы оценки</h2>
    <div id="sliders" class="slider-group"></div>
    <button id="reset-btn">Сбросить</button>

    <div style="text-align:center">
        <div class="legend-gradient"></div>
        <div class="legend-labels"><span>Плохо</span><span>Средне</span><span>Отлично</span></div>
    </div>

    <h2>Рейтинг локаций</h2>
    <div id="rankings"></div>
    </div><!-- /location-ui -->
</div>

<div id="map"></div>
<button id="toggle-sidebar">☰</button>

<!-- CDN Libraries -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<!-- Data -->
<script src="js/data/factors.js"></script>
<script src="js/data/locations.js"></script>
<script src="js/data/islands.js"></script>
<script src="js/data/hazard-events.js"></script>
<script src="js/data/poi-config.js"></script>
<script src="js/data/hazard-config.js"></script>

<!-- Logic -->
<script src="js/scoring.js"></script>
<script src="js/overpass.js"></script>
<script src="js/poi-render.js"></script>
<script src="js/hazard-render.js"></script>
<script src="js/map-init.js"></script>
<script src="js/sidebar.js"></script>

<!-- App Entry -->
<script src="js/app.js"></script>
</body>
</html>
