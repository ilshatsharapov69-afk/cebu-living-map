<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cebu Region Living Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; background: #1a1a2e; color: #e0e0e0; }

        #sidebar {
            width: 350px; min-width: 350px; height: 100vh; overflow-y: auto;
            background: #16213e; padding: 16px; display: flex; flex-direction: column; gap: 10px;
            z-index: 1000; transition: transform 0.3s ease;
        }
        #sidebar h1 { font-size: 18px; color: #e94560; text-align: center; }
        #sidebar h2 { font-size: 12px; color: #a0a0b0; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }

        /* Mode selector - checkboxes */
        .poi-toggles { display: flex; flex-direction: column; gap: 4px; }
        .poi-toggle {
            display: flex; align-items: center; gap: 8px; font-size: 12px;
            padding: 4px 8px; border-radius: 6px; cursor: pointer; transition: background 0.15s;
        }
        .poi-toggle:hover { background: rgba(255,255,255,0.06); }
        .poi-toggle input { accent-color: #e94560; }
        .poi-toggle .poi-color { width: 10px; height: 10px; border-radius: 50%; }
        .poi-toggle .poi-count { color: #666; font-size: 10px; margin-left: auto; }

        /* Rating mode */
        #rating-mode {
            width: 100%; padding: 6px 8px; background: #1a1a2e; color: #e0e0e0;
            border: 1px solid #333; border-radius: 6px; font-size: 12px;
        }
        #rating-mode:focus { border-color: #e94560; outline: none; }

        /* Sliders */
        .slider-group { display: flex; flex-direction: column; gap: 4px; }
        .slider-item {
            display: flex; align-items: center; gap: 6px; font-size: 11px;
            background: rgba(255,255,255,0.03); padding: 3px 8px; border-radius: 6px;
            transition: opacity 0.2s;
        }
        .slider-item.disabled { opacity: 0.3; pointer-events: none; }
        .slider-item .icon { font-size: 14px; width: 20px; text-align: center; }
        .slider-item label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .slider-item input[type=range] { width: 70px; accent-color: #e94560; }
        .slider-item .wv { width: 14px; text-align: center; font-weight: bold; color: #e94560; font-size: 11px; }

        #reset-btn {
            background: #e94560; color: white; border: none; padding: 5px 10px;
            border-radius: 6px; cursor: pointer; font-size: 11px; align-self: center;
        }
        #reset-btn:hover { background: #c73a52; }

        /* Legend */
        .legend-gradient {
            height: 10px; border-radius: 5px; margin: 4px 0;
            background: linear-gradient(to right, hsl(0,80%,45%), hsl(60,80%,45%), hsl(120,80%,45%));
        }
        .legend-labels { display: flex; justify-content: space-between; font-size: 9px; color: #666; }

        /* Loading */
        .poi-status { font-size: 10px; color: #666; text-align: center; }
        .poi-status.loading { color: #e94560; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

        /* Rankings */
        #rankings { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
        .rank-item {
            display: flex; align-items: center; gap: 6px; padding: 5px 8px;
            border-radius: 6px; cursor: pointer; font-size: 11px; transition: background 0.15s;
        }
        .rank-item:hover { background: rgba(255,255,255,0.08); }
        .rank-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .rank-name { flex: 1; }
        .rank-score { font-weight: bold; min-width: 28px; text-align: right; }
        .rank-num { color: #555; width: 16px; font-size: 10px; }

        #map { flex: 1; height: 100vh; }

        #toggle-sidebar {
            display: none; position: fixed; bottom: 16px; left: 16px; z-index: 1001;
            background: #e94560; color: white; border: none; width: 44px; height: 44px;
            border-radius: 50%; font-size: 20px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Popup */
        .loc-popup { font-family: -apple-system, sans-serif; min-width: 260px; }
        .loc-popup h3 { font-size: 14px; margin-bottom: 2px; color: #1a1a2e; }
        .loc-popup .score-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px; color: white;
            font-weight: bold; font-size: 12px; margin-bottom: 6px;
        }
        .bar-row { display: flex; align-items: center; gap: 3px; margin: 1px 0; font-size: 10px; }
        .bar-row.hl { background: #fff3cd; border-radius: 3px; padding: 1px 3px; }
        .bar-icon { width: 16px; text-align: center; }
        .bar-label { width: 100px; color: #555; }
        .bar-track { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; }
        .bar-val { width: 16px; text-align: right; font-weight: bold; color: #333; }
        .loc-meta { margin-top: 6px; font-size: 10px; color: #555; border-top: 1px solid #ddd; padding-top: 4px; }
        .loc-meta div { margin: 1px 0; }
        .loc-meta strong { color: #333; }

        /* Cluster overrides */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background: transparent !important; }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div { background: transparent !important; }
        .poi-cluster-icon {
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 11px;
            border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }

        /* Hazard toggles */
        .hazard-toggles { display: flex; flex-direction: column; gap: 4px; }
        .hazard-toggle {
            display: flex; align-items: center; gap: 8px; font-size: 12px;
            padding: 4px 8px; border-radius: 6px; cursor: pointer; transition: background 0.15s;
        }
        .hazard-toggle:hover { background: rgba(255,255,255,0.06); }
        .hazard-toggle input { accent-color: #e94560; }
        .hazard-toggle .hazard-color { width: 10px; height: 10px; border-radius: 50%; }
        .hazard-toggle .hazard-count { color: #666; font-size: 10px; margin-left: auto; }
        .hazard-legend {
            display: none; font-size: 10px; padding: 4px 8px; border-radius: 6px;
            background: rgba(255,255,255,0.03); margin-top: 4px;
        }
        .hazard-legend.visible { display: flex; gap: 10px; justify-content: center; }
        .hazard-legend span { display: flex; align-items: center; gap: 3px; }
        .hazard-legend .dot { width: 8px; height: 8px; border-radius: 50%; }
        .locations-toggle { margin: 6px 0 2px; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; top: 0; left: 0; width: 300px; height: 100vh; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #toggle-sidebar { display: block; }
            #map { width: 100vw; }
        }
        #sidebar::-webkit-scrollbar, #rankings::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb, #rankings::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>

<div id="sidebar">
    <h1>Cebu Living Map</h1>
    <p style="font-size:10px;color:#666;text-align:center;">Сравнение мест для жизни (~200км от Себу)</p>

    <h2>POI слои (реальные данные OSM)</h2>
    <div id="poi-toggles" class="poi-toggles"></div>
    <div id="poi-status" class="poi-status"></div>

    <h2>Безопасность (слои)</h2>
    <div id="hazard-toggles" class="hazard-toggles"></div>
    <div id="hazard-legend" class="hazard-legend">
        <span style="font-size:9px;color:#888;">Точки = реальные инциденты | Heatmap = плотность</span>
    </div>
    <div id="hazard-status" class="poi-status"></div>

    <div class="hazard-toggle locations-toggle">
        <input type="checkbox" id="show-locations" checked onchange="toggleLocations(this.checked)">
        <span>📍 Показать районы</span>
    </div>

    <div id="location-ui">
    <h2>Оценка районов</h2>
    <select id="rating-mode" onchange="switchRatingMode(this.value)">
        <option value="composite">Все факторы (composite)</option>
    </select>

    <h2>Веса факторов</h2>
    <div id="sliders" class="slider-group"></div>
    <button id="reset-btn" onclick="resetWeights()">Сбросить</button>

    <div style="text-align:center">
        <div class="legend-gradient"></div>
        <div class="legend-labels"><span>Плохо</span><span>Средне</span><span>Отлично</span></div>
    </div>

    <h2>Рейтинг районов</h2>
    <div id="rankings"></div>
    </div><!-- /location-ui -->
</div>

<div id="map"></div>
<button id="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

// ===================== SCORING =====================

function computeScore(loc) {
    let sum = 0, maxSum = 0;
    for (const f of FACTORS) {
        const w = currentWeights[f.key];
        sum += loc.ratings[f.key] * w;
        maxSum += 10 * w;
    }
    return maxSum > 0 ? (sum / maxSum) * 100 : 0;
}

function getScore(loc) {
    if (ratingMode === 'composite') return computeScore(loc);
    return (loc.ratings[ratingMode] || 5) * 10;
}

function scoreToColor(score) {
    return `hsl(${(score / 100) * 120}, 80%, 45%)`;
}
function ratingToColor(r) {
    if (r <= 3) return '#e94560';
    if (r <= 6) return '#f5a623';
    return '#27ae60';
}

// ===================== OVERPASS API =====================

async function fetchPOICategory(key) {
    const config = POI_CATEGORIES[key];
    if (config.static) {
        poiData[key] = config.points;
        return config.points;
    }

    // Check cache
    const cacheKey = 'overpass_' + key;
    try {
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) {
            const parsed = JSON.parse(cached);
            if (Date.now() - parsed.ts < CACHE_TTL) {
                poiData[key] = parsed.data;
                return parsed.data;
            }
        }
    } catch(e) {}

    // Fetch from Overpass
    let overpassData = [];
    try {
        const resp = await fetch(OVERPASS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'data=' + encodeURIComponent(config.query),
        });
        const json = await resp.json();
        overpassData = transformOverpass(json.elements || [], key);
    } catch(e) {
        console.warn(`Overpass failed for ${key}:`, e);
    }

    // Merge with static fallback (if any), deduplicating by proximity
    const merged = mergeWithStatic(overpassData, config.staticFallback || []);
    poiData[key] = merged;

    try {
        sessionStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data: merged }));
    } catch(e) {}

    return merged;
}

function mergeWithStatic(overpassData, staticData) {
    if (!staticData || staticData.length === 0) return overpassData;
    if (overpassData.length === 0) return staticData;

    // Add static points that aren't within 200m of any overpass point
    const merged = [...overpassData];
    for (const sp of staticData) {
        const isDuplicate = overpassData.some(op => {
            const dlat = sp.lat - op.lat;
            const dlng = sp.lng - op.lng;
            return Math.sqrt(dlat*dlat + dlng*dlng) < 0.002; // ~200m
        });
        if (!isDuplicate) merged.push(sp);
    }
    return merged;
}

function transformOverpass(elements, categoryKey) {
    return elements.map(el => {
        const lat = el.lat || (el.center && el.center.lat);
        const lng = el.lon || (el.center && el.center.lon);
        if (!lat || !lng) return null;

        const tags = el.tags || {};
        const name = tags.name || tags['name:en'] || tags.brand || inferName(tags);
        const importance = classifyImportance(el, tags);

        return { name, lat, lng, importance };
    }).filter(Boolean);
}

function inferName(tags) {
    if (tags.operator) return tags.operator;
    const t = tags.shop || tags.amenity || tags.natural || tags.leisure || '';
    const map = { supermarket:'Supermarket', marketplace:'Market', convenience:'Convenience Store',
                  mall:'Mall', department_store:'Department Store', beach:'Beach', beach_resort:'Beach Resort',
                  greengrocer:'Greengrocer', butcher:'Butcher', seafood:'Seafood Shop' };
    return map[t] || 'POI';
}

function classifyImportance(el, tags) {
    const name = (tags.name || '').toLowerCase();
    const brand = (tags.brand || '').toLowerCase();
    const hasBrand = KNOWN_BRANDS.some(b => name.includes(b) || brand.includes(b));
    if (hasBrand || el.type === 'relation') return 'large';
    if (el.type === 'way' || tags.name) return 'medium';
    return 'small';
}

    // Render visible categories
    for (const k of keys) {
        if (poiVisible[k]) renderPOICluster(k);
    }
}

function renderPOICluster(key) {
    // Remove existing
    if (poiClusterGroups[key]) {
        map.removeLayer(poiClusterGroups[key]);
        delete poiClusterGroups[key];
    }

    const data = poiData[key];
    if (!data || data.length === 0) return;

    const config = POI_CATEGORIES[key];
    const clusterOpts = {
        maxClusterRadius: 40,
        showCoverageOnHover: false,
        spiderfyOnMaxZoom: true,
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            const size = count < 10 ? 28 : count < 50 ? 36 : 44;
            return L.divIcon({
                html: `<div class="poi-cluster-icon" style="background:${config.color};width:${size}px;height:${size}px;">${count}</div>`,
                className: '',
                iconSize: [size, size],
            });
        },
    };
    if (config.disableClusteringAtZoom) {
        clusterOpts.disableClusteringAtZoom = config.disableClusteringAtZoom;
    }

    const group = L.markerClusterGroup(clusterOpts);
    for (const poi of data) {
        group.addLayer(createPOIMarker(poi, config));
    }

    poiClusterGroups[key] = group;
    map.addLayer(group);
}

function removePOICluster(key) {
    if (poiClusterGroups[key]) {
        map.removeLayer(poiClusterGroups[key]);
        delete poiClusterGroups[key];
    }
}

// ===================== HAZARD LAYERS =====================

async function fetchEarthquakes() {
    // Check cache
    try {
        const cached = sessionStorage.getItem('usgs_earthquakes');
        if (cached) {
            const parsed = JSON.parse(cached);
            if (Date.now() - parsed.ts < CACHE_TTL) {
                earthquakeData = parsed.data;
                return parsed.data;
            }
        }
    } catch(e) {}

    try {
        const resp = await fetch(USGS_EARTHQUAKE_URL);
        const geojson = await resp.json();
        earthquakeData = geojson.features || [];
        try {
            sessionStorage.setItem('usgs_earthquakes', JSON.stringify({ ts: Date.now(), data: earthquakeData }));
        } catch(e) {}
        return earthquakeData;
    } catch(e) {
        console.warn('USGS fetch failed:', e);
        earthquakeData = [];
        return [];
    }
}

function magToColor(mag, alert) {
    // Sharp contrast: M3-4 grey, M5 yellow, M6 orange, M7+ bright red
    if (alert === 'red') return '#ff0000';
    if (alert === 'orange') return '#ff4500';
    if (mag >= 7) return '#c0392b';
    if (mag >= 6) return '#e67e22';
    if (mag >= 5) return '#f1c40f';
    if (mag >= 4) return '#bdc3c7';
    return '#95a5a6';
}

function alertToLabel(alert) {
    const map = {green:'🟢 Зелёный',yellow:'🟡 Жёлтый',orange:'🟠 Оранжевый',red:'🔴 Красный'};
    return map[alert] || '';
}

function renderEarthquakeLayer() {
    if (hazardLayers.earthquake) {
        map.removeLayer(hazardLayers.earthquake);
        delete hazardLayers.earthquake;
    }
    if (!earthquakeData || earthquakeData.length === 0) return;

    const group = L.layerGroup();

    // Heatmap layer
    const heatPoints = earthquakeData.map(f => {
        const [lng, lat] = f.geometry.coordinates;
        const mag = f.properties.mag;
        const intensity = Math.min(1, Math.max(0.1, Math.pow((mag - 2.5) / 5, 1.5)));
        return [lat, lng, intensity];
    });

    const heat = L.heatLayer(heatPoints, {
        radius: 30, blur: 25, maxZoom: 13, max: 1.0,
        gradient: HAZARD_CATEGORIES.earthquake.gradient,
    });
    group.addLayer(heat);

    // Interactive markers — exponential size, sharp color contrast
    for (const feature of earthquakeData) {
        const [lng, lat, depth] = feature.geometry.coordinates;
        const p = feature.properties;
        const mag = p.mag;
        const alert = p.alert;
        const place = p.place || 'Unknown';
        const time = new Date(p.time).toLocaleDateString();
        const felt = p.felt;
        const tsunami = p.tsunami;
        const mmi = p.mmi;

        const radius = Math.max(3, Math.pow(mag - 2, 1.8));
        const color = magToColor(mag, alert);
        const isStrong = mag >= 6.5;

        const marker = L.circleMarker([lat, lng], {
            radius: radius,
            fillColor: color,
            color: isStrong ? '#fff' : 'rgba(255,255,255,0.3)',
            weight: isStrong ? 2 : 0.5,
            fillOpacity: isStrong ? 0.85 : 0.5,
            opacity: isStrong ? 0.9 : 0.5,
        });

        marker.bindTooltip(`<b>M${mag.toFixed(1)}</b> — ${place}`, { direction: 'top' });

        let popupHtml = `
            <div style="font-family:-apple-system,sans-serif;min-width:180px;">
                <div style="font-size:14px;font-weight:bold;color:${color};">🌍 M${mag.toFixed(1)}</div>
                <div style="font-size:11px;margin:3px 0;">${place}</div>
                <div style="font-size:10px;color:#888;">Глубина: ${depth.toFixed(0)} км</div>
                <div style="font-size:10px;color:#888;">Дата: ${time}</div>`;
        if (alert) popupHtml += `<div style="font-size:10px;margin-top:3px;">PAGER: ${alertToLabel(alert)}</div>`;
        if (felt) popupHtml += `<div style="font-size:10px;color:#888;">Ощутили: ${felt} чел.</div>`;
        if (tsunami) popupHtml += `<div style="font-size:10px;color:#e74c3c;font-weight:bold;">⚠️ Угроза цунами</div>`;
        if (mmi) popupHtml += `<div style="font-size:10px;color:#888;">Интенсивность (MMI): ${mmi.toFixed(1)}</div>`;
        popupHtml += '</div>';

        marker.bindPopup(popupHtml);
        group.addLayer(marker);
    }

    hazardLayers.earthquake = group;
    map.addLayer(group);
}

function renderVolcanoLayer() {
    if (hazardLayers.volcano) {
        map.removeLayer(hazardLayers.volcano);
        delete hazardLayers.volcano;
    }

    const config = HAZARD_CATEGORIES.volcano;
    const group = L.layerGroup();

    // Volcano markers
    for (const v of config.points) {
        // Triangle-like marker using DivIcon
        const marker = L.marker([v.lat, v.lng], {
            icon: L.divIcon({
                html: `<div style="font-size:22px;text-shadow:0 1px 3px rgba(0,0,0,0.5);">🌋</div>`,
                className: '',
                iconSize: [26, 26],
                iconAnchor: [13, 13],
            }),
        });
        marker.bindTooltip(`<b>${v.name}</b> (${v.status})`, { direction: 'top', offset: [0, -12] });
        marker.bindPopup(`
            <div style="font-family:-apple-system,sans-serif;">
                <div style="font-size:14px;font-weight:bold;color:#ff5722;">🌋 ${v.name}</div>
                <div style="font-size:11px;">Статус: ${v.status}</div>
                <div style="font-size:11px;">Высота: ${v.elevation}</div>
                <div style="font-size:10px;color:#888;margin-top:4px;">Красный: PDZ (${v.dangerRadii[0]/1000}км), Оранж: расширенная (${v.dangerRadii[1]/1000}км), Жёлтый: пепел (${v.dangerRadii[2]/1000}км)</div>
            </div>
        `);
        group.addLayer(marker);

        // Danger zone circles
        const colors = ['#e74c3c', '#ff9800', '#ffc107'];
        const labels = ['PDZ', 'Extended', 'Ashfall'];
        v.dangerRadii.forEach((r, i) => {
            const circle = L.circle([v.lat, v.lng], {
                radius: r,
                color: colors[i],
                fillColor: colors[i],
                fillOpacity: 0.08,
                weight: 1.5,
                dashArray: '6 4',
            });
            circle.bindTooltip(`${v.name} — ${labels[i]} zone (${r/1000}км)`, { sticky: true });
            group.addLayer(circle);
        });
    }

    // Fault lines
    for (const fault of config.faultLines) {
        const line = L.polyline(fault.coords.map(c => [c[0], c[1]]), {
            color: '#e74c3c',
            weight: 2.5,
            opacity: 0.7,
            dashArray: '10 6',
        });
        line.bindTooltip(`<b>${fault.name}</b>`, { sticky: true });
        group.addLayer(line);
    }

    hazardLayers.volcano = group;
    map.addLayer(group);
}

// ===================== POINT-BASED HAZARD RENDERERS =====================

function removeHazardLayer(key) {
    if (hazardLayers[key]) {
        map.removeLayer(hazardLayers[key]);
        delete hazardLayers[key];
    }
}

// Universal point hazard renderer (floods, landslides, crime, health)
function renderPointHazardLayer(key) {
    removeHazardLayer(key);
    const config = HAZARD_CATEGORIES[key];
    const events = config.data;
    if (!events || events.length === 0) return;

    const group = L.layerGroup();

    // Heatmap
    const heatPoints = events.map(e => {
        const severity = e.severity || 5;
        const deathWeight = e.deaths ? Math.min(1, Math.log10(e.deaths + 1) / 4) : 0;
        const intensity = Math.min(1, Math.max(0.15, severity / 10 * 0.6 + deathWeight * 0.4));
        return [e.lat, e.lng, intensity];
    });

    const heat = L.heatLayer(heatPoints, {
        radius: 35, blur: 28, maxZoom: 13, max: 1.0,
        gradient: config.gradient,
    });
    group.addLayer(heat);

    // Circle markers
    for (const e of events) {
        const severity = e.severity || 5;
        const radius = Math.max(4, severity * 1.2 + (e.deaths ? Math.min(8, Math.log10(e.deaths + 1) * 3) : 0));
        const isHigh = severity >= 8;

        const marker = L.circleMarker([e.lat, e.lng], {
            radius: radius,
            fillColor: config.color,
            color: isHigh ? '#fff' : 'rgba(255,255,255,0.3)',
            weight: isHigh ? 2 : 0.5,
            fillOpacity: isHigh ? 0.85 : 0.55,
            opacity: isHigh ? 0.9 : 0.5,
        });

        marker.bindTooltip(`<b>${config.icon} ${e.name}</b>`, { direction: 'top' });

        let popup = `<div style="font-family:-apple-system,sans-serif;min-width:200px;">
            <div style="font-size:13px;font-weight:bold;color:${config.color};">${config.icon} ${e.name}</div>`;
        if (e.date || e.period) popup += `<div style="font-size:10px;color:#888;">Дата: ${e.date || e.period}</div>`;
        if (e.location) popup += `<div style="font-size:10px;color:#888;">📍 ${e.location}</div>`;
        if (e.deaths) popup += `<div style="font-size:11px;color:#c0392b;font-weight:bold;">☠️ Погибших: ${e.deaths.toLocaleString()}</div>`;
        if (e.affected) popup += `<div style="font-size:10px;color:#888;">Пострадавших: ${e.affected.toLocaleString()}</div>`;
        if (e.cases) popup += `<div style="font-size:10px;color:#888;">Случаев: ${e.cases.toLocaleString()}</div>`;
        if (e.cause) popup += `<div style="font-size:10px;color:#888;">Причина: ${e.cause}</div>`;
        if (e.type) popup += `<div style="font-size:10px;color:#888;">Тип: ${e.type}</div>`;
        popup += `<div style="font-size:10px;color:#555;margin-top:4px;">${e.info}</div></div>`;

        marker.bindPopup(popup);
        group.addLayer(marker);
    }

    hazardLayers[key] = group;
    map.addLayer(group);
}

// Typhoon renderer with tracks + points
function renderTyphoonLayer() {
    removeHazardLayer('typhoon');
    const config = HAZARD_CATEGORIES.typhoon;
    const events = config.data;
    if (!events || events.length === 0) return;

    const group = L.layerGroup();

    // Category to color
    function catColor(cat) {
        if (cat >= 5) return '#8b0000';
        if (cat >= 4) return '#cc0000';
        if (cat >= 3) return '#e67e22';
        if (cat >= 2) return '#f1c40f';
        return '#95a5a6';
    }

    // Heatmap from all track points
    const heatPoints = [];
    for (const t of events) {
        for (const p of t.track) {
            const intensity = Math.min(1, Math.max(0.15, (p.wind || t.maxWind) / 320));
            heatPoints.push([p.lat, p.lng, intensity]);
        }
    }
    const heat = L.heatLayer(heatPoints, {
        radius: 35, blur: 30, maxZoom: 12, max: 1.0,
        gradient: config.gradient,
    });
    group.addLayer(heat);

    // Track lines + points for each typhoon
    for (const t of events) {
        const coords = t.track.map(p => [p.lat, p.lng]);
        const color = catColor(t.category);

        // Track polyline
        const line = L.polyline(coords, {
            color: color, weight: 2.5, opacity: 0.7, dashArray: '8 5',
        });
        line.bindTooltip(`<b>${config.icon} ${t.name}</b> (Cat ${t.category})`, { sticky: true });
        group.addLayer(line);

        // Points along track
        for (const p of t.track) {
            const wind = p.wind || t.maxWind;
            const radius = Math.max(3, wind / 40);

            const marker = L.circleMarker([p.lat, p.lng], {
                radius: radius,
                fillColor: color,
                color: t.category >= 4 ? '#fff' : 'rgba(255,255,255,0.3)',
                weight: t.category >= 4 ? 1.5 : 0.5,
                fillOpacity: 0.7,
                opacity: 0.7,
            });

            marker.bindTooltip(`<b>${t.name}</b> — ${p.label}<br>Ветер: ${wind} км/ч`, { direction: 'top' });
            marker.bindPopup(`
                <div style="font-family:-apple-system,sans-serif;min-width:200px;">
                    <div style="font-size:14px;font-weight:bold;color:${color};">🌀 ${t.name}</div>
                    <div style="font-size:11px;margin:3px 0;">Категория: ${t.category} | Макс. ветер: ${t.maxWind} км/ч</div>
                    <div style="font-size:11px;">📍 ${p.label}</div>
                    <div style="font-size:10px;color:#888;">Дата: ${t.date}</div>
                    ${t.deaths ? `<div style="font-size:11px;color:#c0392b;font-weight:bold;">☠️ Погибших: ${t.deaths.toLocaleString()}</div>` : ''}
                    <div style="font-size:10px;color:#555;margin-top:4px;">${t.info}</div>
                </div>
            `);
            group.addLayer(marker);
        }
    }

    hazardLayers.typhoon = group;
    map.addLayer(group);
}

async function toggleHazardLayer(key, show) {
    hazardVisible[key] = show;

    if (!show) {
        removeHazardLayer(key);
        updateHazardLegend();
        return;
    }

    const status = document.getElementById('hazard-status');

    if (key === 'earthquake') {
        if (!earthquakeData) {
            status.textContent = 'Загрузка землетрясений (USGS)...';
            status.className = 'poi-status loading';
            await fetchEarthquakes();
            const count = earthquakeData?.length || 0;
            updateHazardCount('earthquake', count);
            status.textContent = count > 0 ? `Загружено ${count} землетрясений (M3+, с 2014)` : 'Нет данных USGS';
            status.className = 'poi-status';
        }
        renderEarthquakeLayer();
    } else if (key === 'volcano') {
        renderVolcanoLayer();
    } else if (key === 'typhoon') {
        renderTyphoonLayer();
        const count = TYPHOON_EVENTS.length;
        updateHazardCount('typhoon', count);
    } else {
        renderPointHazardLayer(key);
        const config = HAZARD_CATEGORIES[key];
        const count = config.data ? config.data.length : 0;
        updateHazardCount(key, count);
    }

    updateHazardLegend();
}

function updateHazardLegend() {
    const legend = document.getElementById('hazard-legend');
    const anyVisible = Object.values(hazardVisible).some(v => v);
    legend.className = anyVisible ? 'hazard-legend visible' : 'hazard-legend';
}

function renderHazardToggles() {
    const container = document.getElementById('hazard-toggles');
    container.innerHTML = '';
    for (const [key, config] of Object.entries(HAZARD_CATEGORIES)) {
        hazardVisible[key] = false;
        const div = document.createElement('div');
        div.className = 'hazard-toggle';
        div.innerHTML = `
            <input type="checkbox" id="hazard-${key}" data-key="${key}">
            <span class="hazard-color" style="background:${config.color}"></span>
            <span>${config.icon} ${config.label}</span>
            <span class="hazard-count" id="hazard-count-${key}"></span>
        `;
        div.querySelector('input').addEventListener('change', (e) => {
            toggleHazardLayer(key, e.target.checked);
        });
        container.appendChild(div);
    }
}

function updateHazardCount(key, count) {
    const el = document.getElementById('hazard-count-' + key);
    if (el) el.textContent = count > 0 ? count : '';
}

function renderMarkers() {
    markersLayer.clearLayers();
    for (const loc of LOCATIONS) {
        const score = getScore(loc);
        const color = scoreToColor(score);
        const radius = 6 + (score / 100) * 10;

        const marker = L.circleMarker([loc.lat, loc.lng], {
            radius, fillColor: color, color: '#fff', weight: 2, opacity: 0.9, fillOpacity: 0.85,

        const label = ratingMode === 'composite' ? 'Score' : (FACTORS.find(f=>f.key===ratingMode)?.label || 'Score');

        marker.bindPopup(createPopupHTML(loc, score), { maxWidth: 320, maxHeight: 420 });
        marker.addTo(markersLayer);
        loc._marker = marker;
        loc._score = score;

function createPopupHTML(loc, score) {
    const color = scoreToColor(score);
    let h = `<div class="loc-popup"><h3>${loc.name}</h3>`;
    h += `<span class="score-badge" style="background:${color}">${Math.round(score)}/100</span><div style="margin-top:4px">`;
    for (const f of FACTORS) {
        const r = loc.ratings[f.key];

        h += `<div class="bar-row${hl}"><span class="bar-icon">${f.icon}</span><span class="bar-label">${f.label}</span>`;
        h += `<div class="bar-track"><div class="bar-fill" style="width:${r*10}%;background:${ratingToColor(r)}"></div></div>`;
        h += `<span class="bar-val">${r}</span></div>`;
    }
    h += `</div><div class="loc-meta">`;
    h += `<div><strong>Аренда:</strong> ${loc.meta.rent}</div>`;
    h += `<div><strong>Интернет:</strong> ${loc.meta.internet}</div>`;
    h += `<div><strong>BI:</strong> ${loc.meta.bi}</div>`;
    h += `<div><strong>Из Себу:</strong> ${loc.meta.ferry}</div>`;
    h += `<div><strong>Заметки:</strong> ${loc.meta.notes}</div>`;
    const gmUrl = `https://www.google.com/maps/search/${encodeURIComponent(loc.name)}/@${loc.lat},${loc.lng},14z`;
    h += `<div style="margin-top:6px;"><a href="${gmUrl}" target="_blank" rel="noopener"
        style="display:block;text-align:center;padding:6px;background:#4285f4;color:white;border-radius:4px;text-decoration:none;font-size:11px;font-weight:bold;">
        📍 Открыть в Google Maps</a></div>`;
    h += `</div></div>`;
    return h;
}

        html += `<option value="${f.key}">${f.icon} ${f.label}</option>`;
    }
    select.innerHTML = html;
}

function switchRatingMode(mode) {
    ratingMode = mode;
    const items = document.querySelectorAll('.slider-item');
    items.forEach(el => el.classList.toggle('disabled', mode !== 'composite'));
    document.getElementById('reset-btn').style.opacity = mode !== 'composite' ? '0.3' : '1';
    document.getElementById('reset-btn').style.pointerEvents = mode !== 'composite' ? 'none' : 'auto';
    renderMarkers();
    renderRankings();
}

function renderSliders() {
    const container = document.getElementById('sliders');
    container.innerHTML = '';
    for (const f of FACTORS) {
        const div = document.createElement('div');
        div.className = 'slider-item' + (ratingMode !== 'composite' ? ' disabled' : '');
        div.innerHTML = `<span class="icon">${f.icon}</span><label>${f.label}</label>
            <input type="range" min="0" max="5" value="${currentWeights[f.key]}">
            <span class="wv" id="wv-${f.key}">${currentWeights[f.key]}</span>`;
        div.querySelector('input').addEventListener('input', (e) => {
            currentWeights[f.key] = parseInt(e.target.value);
            document.getElementById(`wv-${f.key}`).textContent = e.target.value;
            renderMarkers();
            renderRankings();
        });
        container.appendChild(div);
    }
}

function renderRankings() {
    const container = document.getElementById('rankings');
    const scored = LOCATIONS.map(loc => ({ loc, score: getScore(loc) }));
    scored.sort((a, b) => b.score - a.score);
    container.innerHTML = '';
    scored.forEach((item, i) => {
        const c = scoreToColor(item.score);
        const div = document.createElement('div');
        div.className = 'rank-item';
        div.innerHTML = `<span class="rank-num">${i+1}.</span><span class="rank-dot" style="background:${c}"></span>
            <span class="rank-name">${item.loc.name}</span><span class="rank-score" style="color:${c}">${Math.round(item.score)}</span>`;
        div.addEventListener('click', () => {
            map.flyTo([item.loc.lat, item.loc.lng], 14, { duration: 1 });
            setTimeout(() => item.loc._marker?.openPopup(), 1100);
        });
        container.appendChild(div);
    });
}

function resetWeights() {
    FACTORS.forEach(f => { currentWeights[f.key] = f.defaultWeight; });
    renderSliders();
    renderMarkers();
    renderRankings();
}

// ===================== INIT =====================

document.addEventListener('DOMContentLoaded', () => {
    initMap();
    renderPOIToggles();
    renderHazardToggles();
    renderRatingModeSelect();
    renderSliders();
    renderMarkers();
    renderRankings();
    fetchAllPOIs();
});
</script>
</body>
</html>
